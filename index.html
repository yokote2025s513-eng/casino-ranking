<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CASINO ROYALE – RANKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f0c040;--gold2:#ffd700;--neon:#00ffe7;--dark:#05080f;
  --card:#0b1120;--border:rgba(240,192,64,.25);--glow:0 0 18px rgba(240,192,64,.5);
}
html,body{height:100%}
body{background:var(--dark);color:#e8dfc0;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(rgba(0,255,231,.04) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,255,231,.04) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;
  opacity:0;animation:twinkle 4s infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.8}}
.wrapper{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 24px 80px}

/* header */
header{text-align:center;padding:56px 0 36px}
.logo-sub{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.5em;color:var(--neon);
  text-transform:uppercase;opacity:.8;margin-bottom:10px}
h1{font-family:'Orbitron',monospace;font-size:clamp(2rem,6vw,4.5rem);font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold),#c8860a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(240,192,64,.6));letter-spacing:.05em}
.subtitle{margin-top:14px;font-size:1rem;letter-spacing:.35em;color:rgba(232,223,192,.5);text-transform:uppercase}
.header-deco{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:22px}
.header-deco span{display:inline-block;height:1px;width:120px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.suit{font-size:1.4rem;color:var(--gold);filter:drop-shadow(0 0 6px var(--gold))}

/* nav */
nav{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:48px}
nav a{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.15em;color:var(--neon);
  text-decoration:none;border:1px solid var(--neon);padding:8px 22px;border-radius:2px;
  transition:all .25s;text-transform:uppercase}
nav a:hover{background:var(--neon);color:var(--dark);box-shadow:0 0 20px var(--neon)}

/* ticker */
.ticker-wrap{width:100%;overflow:hidden;background:rgba(240,192,64,.06);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:10px 0;margin-bottom:40px}
.ticker{display:flex;gap:60px;white-space:nowrap;animation:ticker 25s linear infinite;
  font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--gold)}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* section */
.section-title{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.4em;color:var(--neon);
  text-transform:uppercase;text-align:center;margin-bottom:32px;opacity:.9}

/* game grid */
.game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:28px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;position:relative;transition:transform .3s,box-shadow .3s}
.game-card:hover{transform:translateY(-4px);box-shadow:var(--glow)}
.game-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(240,192,64,.05) 0%,transparent 60%);pointer-events:none}
.card-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.game-icon{font-size:2rem;filter:drop-shadow(0 0 6px var(--gold));line-height:1}
.game-name{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;letter-spacing:.1em;color:var(--gold)}
.game-count{font-size:.75rem;color:rgba(232,223,192,.4);letter-spacing:.05em;margin-top:2px}

.rank-list{padding:10px 0}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 20px;
  border-bottom:1px solid rgba(240,192,64,.07);transition:background .2s;position:relative}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:rgba(240,192,64,.04)}
.rank-num{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;
  width:28px;text-align:center;flex-shrink:0}
.rank-num.r1{color:#ffd700;font-size:.9rem}
.rank-num.r2{color:#c0c0c0}
.rank-num.r3{color:#cd7f32}
.rank-num.r4,.rank-num.r5{color:rgba(232,223,192,.4)}
.rank-nick{flex:1;font-size:1rem;font-weight:600;letter-spacing:.05em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-row.r1 .rank-nick{color:#ffd700}
.rank-amount{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--neon);white-space:nowrap;flex-shrink:0}
.rank-row.r1 .rank-amount{color:var(--gold2);font-size:.9rem}
.bar{position:absolute;left:0;top:0;bottom:0;background:rgba(240,192,64,.06);transition:width .6s cubic-bezier(.4,0,.2,1)}
.empty-msg{padding:24px 20px;text-align:center;color:rgba(232,223,192,.3);font-size:.85rem;letter-spacing:.15em}

/* live dot */
.live-badge{display:inline-flex;align-items:center;gap:8px;
  font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.2em;
  color:var(--neon);margin-bottom:16px;justify-content:center;width:100%}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);
  animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,231,.6)}50%{box-shadow:0 0 0 6px rgba(0,255,231,0)}}

/* loading */
.loading{text-align:center;padding:80px 0;font-family:'Orbitron',monospace;
  font-size:.75rem;letter-spacing:.3em;color:rgba(232,223,192,.3);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

footer{text-align:center;padding:40px 0 0;font-size:.72rem;letter-spacing:.2em;
  color:rgba(232,223,192,.25);text-transform:uppercase}
@media(max-width:600px){h1{font-size:2rem}.game-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrapper">
  <header>
    <p class="logo-sub">High School Festival 2025</p>
    <h1>CASINO ROYALE</h1>
    <p class="subtitle">Live Ranking Board</p>
    <div class="header-deco">
      <span></span><span class="suit">♠ ♥ ♦ ♣</span><span></span>
    </div>
  </header>

  <nav>
    <a href="index.html">🏠 TOP</a>
    <a href="ranking.html">🏆 ランキング</a>
    <a href="obs.html">📺 OBS</a>
    <a href="admin.html">⚙ 管理者</a>
  </nav>

  <div class="ticker-wrap"><div class="ticker" id="ticker">LOADING...</div></div>

  <div class="live-badge"><span class="live-dot"></span>LIVE – リアルタイム更新中</div>
  <p class="section-title">▸ GAME RANKINGS – TOP 5 ◂</p>
  <div class="game-grid" id="gameGrid"><div class="loading">CONNECTING...</div></div>

  <footer><p>© 2025 Casino Royale – School Festival Edition</p></footer>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="data.js"></script>
<script>
// starfield
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('span');
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*4}s`;
  starsEl.appendChild(s)}

const ICONS={'ポーカー':'🃏','チンチロ':'🎲','ブラックジャック':'🂡','競馬':'🏇'};

function renderCard(game, records){
  const data=aggregateByGame(records,game).slice(0,5);
  const max=data[0]?.total||1;
  const rows=data.length===0
    ?`<div class="empty-msg">NO DATA YET</div>`
    :data.map((d,i)=>{
        const cls=`r${i+1}`;
        const crown=i===0?'👑':'';
        const pct=(d.total/max*100).toFixed(1);
        return `<div class="rank-row ${cls}">
          <div class="bar" style="width:${pct}%"></div>
          <span class="rank-num ${cls}">${crown||(i+1)}</span>
          <span class="rank-nick">${d.nickname}</span>
          <span class="rank-amount">${fmt(d.total)}</span>
        </div>`;
      }).join('');
  return `<div class="game-card">
    <div class="card-header">
      <span class="game-icon">${ICONS[game]}</span>
      <div><div class="game-name">${game}</div><div class="game-count">${data.length} players</div></div>
    </div>
    <div class="rank-list">${rows}</div>
  </div>`;
}

function render(records){
  document.getElementById('gameGrid').innerHTML=GAMES.map(g=>renderCard(g,records)).join('');
  const all=aggregateAll(records).slice(0,10);
  const t=all.map(d=>`${d.nickname}  ${fmt(d.total)}`).join('　◆　');
  document.getElementById('ticker').textContent=t?t+'　　　'+t:'データなし';
}

// リアルタイム購読
onRecordsChange(records=>{
  if(records.length===0){ seedIfEmpty(); return; }
  render(records);
});
</script>
</body>
</html>

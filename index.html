<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CASINO ROYALE – TOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#f0c040;--gold2:#ffd700;--neon:#00ffe7;--dark:#05080f;--card:#0b1120;--border:rgba(240,192,64,.25);--glow:0 0 18px rgba(240,192,64,.5)}
html,body{min-height:100vh}
body{background:var(--dark);color:#e8dfc0;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:linear-gradient(rgba(0,255,231,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,231,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:0;animation:twinkle 4s infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.8}}
.wrapper{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 24px 80px}
header{text-align:center;padding:52px 0 28px}
.logo-sub{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.5em;color:var(--neon);text-transform:uppercase;opacity:.8;margin-bottom:10px}
h1{font-family:'Orbitron',monospace;font-size:clamp(2rem,6vw,4.5rem);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold),#c8860a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(240,192,64,.6));letter-spacing:.05em}
.subtitle{margin-top:12px;font-size:1rem;letter-spacing:.35em;color:rgba(232,223,192,.5);text-transform:uppercase}
.header-deco{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:18px}
.header-deco span{display:inline-block;height:1px;width:120px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.suit{font-size:1.4rem;color:var(--gold);filter:drop-shadow(0 0 6px var(--gold))}
nav{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:36px}
nav a{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:.15em;color:var(--neon);text-decoration:none;border:1px solid var(--neon);padding:8px 20px;border-radius:2px;transition:all .25s;text-transform:uppercase}
nav a:hover,nav a.active{background:var(--neon);color:var(--dark);box-shadow:0 0 20px var(--neon)}
/* Visitor */
.visitor-bar{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:16px 24px;display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:32px}
.visitor-icon{font-size:1.7rem;filter:drop-shadow(0 0 6px var(--neon))}
.visitor-num{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:700;color:var(--neon);line-height:1;filter:drop-shadow(0 0 8px rgba(0,255,231,.4))}
.visitor-label{font-family:'Orbitron',monospace;font-size:.56rem;letter-spacing:.25em;color:rgba(232,223,192,.4);margin-top:4px}
/* Section */
.section-title{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.4em;color:var(--neon);text-transform:uppercase;text-align:center;margin-bottom:22px;opacity:.9}
.live-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--neon);margin-bottom:12px;justify-content:center;width:100%}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,231,.6)}50%{box-shadow:0 0 0 6px rgba(0,255,231,0)}}
/* Wait grid */
.wait-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:36px}
.wait-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:16px 18px;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
.wait-card:hover{transform:translateY(-3px);box-shadow:var(--glow)}
.wait-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,.04) 0%,transparent 60%);pointer-events:none}
.wc-name{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.wc-icon{font-size:1.2rem;filter:drop-shadow(0 0 4px var(--gold))}
.wc-badge{display:inline-block;font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.1em;padding:2px 8px;border-radius:2px;margin-bottom:10px}
.wc-badge.open{background:rgba(0,255,231,.1);color:var(--neon);border:1px solid rgba(0,255,231,.3)}
.wc-badge.wait{background:rgba(240,192,64,.1);color:var(--gold);border:1px solid rgba(240,192,64,.3)}
.wc-badge.full{background:rgba(255,76,106,.1);color:#ff4c6a;border:1px solid rgba(255,76,106,.3)}
.wc-badge.closed{background:rgba(232,223,192,.05);color:rgba(232,223,192,.22);border:1px solid rgba(232,223,192,.1)}
.wc-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.wc-metric{background:rgba(0,0,0,.28);border-radius:3px;padding:7px 4px;text-align:center}
.wc-val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--gold2);line-height:1}
.wc-val.neon{color:var(--neon)}
.wc-val.green{color:#5dde8a}
.wc-lab{font-size:.54rem;color:rgba(232,223,192,.35);letter-spacing:.04em;margin-top:2px}
/* Ticker */
.ticker-wrap{overflow:hidden;background:rgba(240,192,64,.06);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 0;margin-bottom:32px}
.ticker{display:flex;gap:60px;white-space:nowrap;animation:ticker 25s linear infinite;font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--gold)}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
/* Ranking grid */
.game-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:900px){.game-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.game-grid{grid-template-columns:1fr}}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative;transition:transform .3s,box-shadow .3s}
.game-card:hover{transform:translateY(-4px);box-shadow:var(--glow)}
.game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,.05) 0%,transparent 60%);pointer-events:none}
.card-header{padding:14px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.game-icon{font-size:1.6rem;filter:drop-shadow(0 0 5px var(--gold))}
.game-name{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;letter-spacing:.1em;color:var(--gold)}
.game-count{font-size:.68rem;color:rgba(232,223,192,.35);letter-spacing:.05em;margin-top:2px}
.rank-list{padding:7px 0}
.rank-row{display:flex;align-items:center;gap:9px;padding:8px 16px;border-bottom:1px solid rgba(240,192,64,.06);position:relative;transition:background .2s}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:rgba(240,192,64,.03)}
.rank-num{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;width:24px;text-align:center;flex-shrink:0}
.rank-num.r1{color:#ffd700;font-size:.85rem}
.rank-num.r2{color:#c0c0c0}
.rank-num.r3{color:#cd7f32}
.rank-num.r4,.rank-num.r5{color:rgba(232,223,192,.35)}
.rank-nick{flex:1;font-size:.9rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-row.r1 .rank-nick{color:#ffd700}
.rank-amount{font-family:'Orbitron',monospace;font-size:.72rem;color:var(--neon);white-space:nowrap;flex-shrink:0}
.rank-row.r1 .rank-amount{color:var(--gold2)}
.bar{position:absolute;left:0;top:0;bottom:0;background:rgba(240,192,64,.05);transition:width .6s cubic-bezier(.4,0,.2,1)}
.empty-msg{padding:18px;text-align:center;color:rgba(232,223,192,.25);font-size:.78rem;letter-spacing:.1em}
.loading{text-align:center;padding:50px 0;font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.3em;color:rgba(232,223,192,.22);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
footer{text-align:center;padding:40px 0 0;font-size:.7rem;letter-spacing:.2em;color:rgba(232,223,192,.2);text-transform:uppercase}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrapper">
  <header>
    <p class="logo-sub">High School Festival 2025</p>
    <h1>CASINO ROYALE</h1>
    <p class="subtitle">Live Ranking Board</p>
    <div class="header-deco"><span></span><span class="suit">♠ ♥ ♦ ♣</span><span></span></div>
  </header>
  <nav>
    <a href="index.html" class="active">🏠 TOP</a>
    <a href="ranking.html">🏆 ランキング</a>
    <a href="admin.html">⚙ 管理者</a>
    <a href="https://yokote2025s513-eng.github.io/casino-rulebook/" target="_blank">📖 ルール</a>
  </nav>
  <div class="visitor-bar">
    <div class="visitor-icon">👥</div>
    <div>
      <div class="visitor-num" id="visitorNum">—</div>
      <div class="visitor-label">本日の来場者数</div>
    </div>
  </div>
  <div class="live-badge"><span class="live-dot"></span>LIVE – リアルタイム更新中</div>
  <p class="section-title">▸ 現在の待ち状況 ◂</p>
  <div class="wait-grid" id="waitGrid"><div class="loading">CONNECTING...</div></div>
  <div class="ticker-wrap"><div class="ticker" id="ticker">LOADING...</div></div>
  <p class="section-title">▸ GAME RANKINGS – TOP 5 ◂</p>
  <div class="game-grid" id="gameGrid"><div class="loading">CONNECTING...</div></div>
  <footer><p>© 2025 Casino Royale – School Festival Edition</p></footer>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="data.js"></script>
<script>
const se=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('span');s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*4}s`;se.appendChild(s)}
const ICONS={'ポーカー':'🃏','チンチロ':'🎲','ブラックジャック':'🂡','競馬':'🏇'};
const SL={open:'OPEN – 空きあり',wait:'WAIT – 待ちあり',full:'FULL – 混雑中',closed:'CLOSED'};
let gD={},qD={};
function cls(game){
  const g=gD[game];
  if(!g||!g.open)return'closed';
  const q=sortedQueue(qD,game).filter(e=>!e.served);
  if(!q.length)return'open';
  if(q.length<(g.tables||1)*2)return'wait';
  return'full';
}
function renderWait(){
  const grid=document.getElementById('waitGrid');
  const games=Object.keys(gD);
  if(!games.length){grid.innerHTML='<div class="loading">CONNECTING...</div>';return;}
  grid.innerHTML=games.map(game=>{
    const g=gD[game],c=cls(game),q=sortedQueue(qD,game).filter(e=>!e.served);
    const wait=calcWaitMinutes(g,q),next=q[0]?String(q[0].num).padStart(3,'0'):'—';
    return`<div class="wait-card">
      <div class="wc-name"><span class="wc-icon">${ICONS[game]||'🎴'}</span>${game}</div>
      <div class="wc-badge ${c}">${SL[c]}</div>
      <div class="wc-metrics">
        <div class="wc-metric"><div class="wc-val">${q.length}</div><div class="wc-lab">待ち組数</div></div>
        <div class="wc-metric"><div class="wc-val neon">${wait!==null?wait+'分':'--'}</div><div class="wc-lab">目安待ち</div></div>
        <div class="wc-metric"><div class="wc-val green">${next}</div><div class="wc-lab">次の番号</div></div>
      </div></div>`;
  }).join('');
}
function renderCard(game,records){
  const data=aggregateByGame(records,game).slice(0,5),max=data[0]?.total||1;
  const rows=data.length===0?`<div class="empty-msg">NO DATA YET</div>`
    :data.map((d,i)=>`<div class="rank-row r${i+1}">
      <div class="bar" style="width:${(d.total/max*100).toFixed(1)}%"></div>
      <span class="rank-num r${i+1}">${i===0?'👑':i+1}</span>
      <span class="rank-nick">${d.nickname}</span>
      <span class="rank-amount">${fmt(d.total)}</span></div>`).join('');
  return`<div class="game-card">
    <div class="card-header"><span class="game-icon">${ICONS[game]||'🎴'}</span>
      <div><div class="game-name">${game}</div><div class="game-count">${aggregateByGame(records,game).length} players</div></div>
    </div><div class="rank-list">${rows}</div></div>`;
}
onGamesChange(d=>{gD=d;renderWait();});
onQueuesChange(d=>{qD=d;renderWait();});
onRecordsChange(records=>{
  document.getElementById('gameGrid').innerHTML=GAMES.map(g=>renderCard(g,records)).join('');
  const all=aggregateAll(records).slice(0,10);
  const t=all.map(d=>`${d.nickname}  ${fmt(d.total)}`).join('　◆　');
  document.getElementById('ticker').textContent=t?t+'　　　'+t:'データなし';
});
onVisitorCountChange(n=>{document.getElementById('visitorNum').textContent=n||0;});
</script>
</body>
</html>

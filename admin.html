<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CASINO ROYALE – 管理者</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#f0c040;--gold2:#ffd700;--neon:#00ffe7;--dark:#05080f;--card:#0b1120;--border:rgba(240,192,64,.25);--danger:#ff4c6a}
html,body{min-height:100vh;height:100%}
body{background:var(--dark);color:#e8dfc0;font-family:'Rajdhani',sans-serif;overflow-x:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(rgba(0,255,231,.04) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,255,231,.04) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:0;animation:twinkle 4s infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.8}}

/* ===== LOGIN ===== */
.screen{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.screen.hidden{display:none}

.login-box{background:var(--card);border:1px solid var(--gold);border-radius:6px;
  padding:52px 44px;text-align:center;width:100%;max-width:380px;position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(240,192,64,.12)}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.login-sub{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.5em;
  color:var(--neon);display:block;margin-bottom:10px;text-transform:uppercase}
.login-logo{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-bottom:4px;filter:drop-shadow(0 0 16px rgba(240,192,64,.4))}
.login-logo2{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--neon);
  letter-spacing:.25em;display:block;margin-bottom:36px;opacity:.8}
.login-lbl{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.25em;
  color:rgba(232,223,192,.35);margin-bottom:10px;display:block;text-transform:uppercase}
.login-input{background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:4px;
  color:#e8dfc0;font-family:'Rajdhani',sans-serif;font-size:1.3rem;
  padding:13px 18px;width:100%;text-align:center;letter-spacing:.4em;outline:none;
  transition:border-color .2s,box-shadow .2s}
.login-input:focus{border-color:var(--gold);box-shadow:0 0 14px rgba(240,192,64,.18)}
.login-btn{margin-top:20px;width:100%;padding:14px;font-family:'Orbitron',monospace;
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--dark);border:none;border-radius:4px;cursor:pointer;transition:all .3s;font-weight:700}
.login-btn:hover{box-shadow:0 0 28px rgba(240,192,64,.45);transform:translateY(-1px)}
.login-err{margin-top:14px;font-family:'Orbitron',monospace;font-size:.6rem;
  letter-spacing:.15em;color:var(--danger);opacity:0;transition:opacity .3s;min-height:20px}
.login-err.show{opacity:1}

/* ===== CHOICE SCREEN ===== */
.choice-box{width:100%;max-width:600px;text-align:center}
.choice-header{margin-bottom:48px}
.choice-sub{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.5em;
  color:var(--neon);margin-bottom:10px;display:block;opacity:.8}
.choice-logo{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold),#c8860a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(240,192,64,.5));display:block;margin-bottom:6px}
.choice-title{font-family:'Orbitron',monospace;font-size:.75rem;letter-spacing:.3em;
  color:rgba(232,223,192,.4)}
.choice-deco{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.choice-deco span{display:inline-block;height:1px;width:80px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.suit{font-size:1.1rem;color:var(--gold);filter:drop-shadow(0 0 5px var(--gold))}

.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.choice-card{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:36px 24px;text-decoration:none;color:inherit;display:block;
  position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s,border-color .3s;
  cursor:pointer}
.choice-card:hover{transform:translateY(-6px)}
.choice-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(240,192,64,.05) 0%,transparent 60%);pointer-events:none}
.choice-card.reserve{border-color:rgba(0,255,231,.3)}
.choice-card.reserve::before{background:linear-gradient(135deg,rgba(0,255,231,.07) 0%,transparent 60%)}
.choice-card.reserve:hover{box-shadow:0 0 30px rgba(0,255,231,.2);border-color:rgba(0,255,231,.6)}
.choice-card.ranking{border-color:rgba(240,192,64,.3)}
.choice-card.ranking:hover{box-shadow:0 0 30px rgba(240,192,64,.25);border-color:rgba(240,192,64,.7)}
.choice-icon{font-size:3.2rem;display:block;margin-bottom:16px;
  filter:drop-shadow(0 0 10px rgba(240,192,64,.4));line-height:1}
.choice-card.reserve .choice-icon{filter:drop-shadow(0 0 10px rgba(0,255,231,.4))}
.choice-name{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;
  letter-spacing:.15em;margin-bottom:10px}
.choice-card.reserve .choice-name{color:var(--neon)}
.choice-card.ranking .choice-name{color:var(--gold)}
.choice-desc{font-size:.8rem;color:rgba(232,223,192,.45);letter-spacing:.04em;line-height:1.6}
.choice-arrow{display:inline-block;margin-top:16px;font-family:'Orbitron',monospace;
  font-size:.6rem;letter-spacing:.2em;padding:6px 16px;border-radius:2px;transition:all .2s}
.choice-card.reserve .choice-arrow{color:var(--neon);border:1px solid rgba(0,255,231,.4)}
.choice-card.reserve:hover .choice-arrow{background:rgba(0,255,231,.12)}
.choice-card.ranking .choice-arrow{color:var(--gold);border:1px solid rgba(240,192,64,.4)}
.choice-card.ranking:hover .choice-arrow{background:rgba(240,192,64,.1)}

.back-nav{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.back-nav a{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.12em;
  color:var(--neon);text-decoration:none;border:1px solid rgba(0,255,231,.3);
  padding:7px 16px;border-radius:2px;transition:all .25s;opacity:.6}
.back-nav a:hover{opacity:1;background:rgba(0,255,231,.08)}
.logout-btn{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.12em;
  color:rgba(232,223,192,.35);background:transparent;border:1px solid rgba(232,223,192,.15);
  padding:7px 16px;border-radius:2px;cursor:pointer;transition:all .25s}
.logout-btn:hover{color:rgba(232,223,192,.7);border-color:rgba(232,223,192,.35)}

@media(max-width:480px){
  .choice-grid{grid-template-columns:1fr}
  .login-box{padding:40px 28px}
}
</style>
</head>
<body>
<div id="stars"></div>

<!-- ===== LOGIN SCREEN ===== -->
<div class="screen" id="screenLogin">
  <div class="login-box">
    <span class="login-sub">Staff Only</span>
    <span class="login-logo">CASINO ROYALE</span>
    <span class="login-logo2">管理者パネル</span>
    <label class="login-lbl">パスワードを入力</label>
    <input class="login-input" id="pwInput" type="password" placeholder="••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTER ▶</button>
    <div class="login-err" id="loginErr">パスワードが違います</div>
  </div>
</div>

<!-- ===== CHOICE SCREEN ===== -->
<div class="screen hidden" id="screenChoice">
  <div class="choice-box">
    <div class="choice-header">
      <span class="choice-sub">Admin Panel</span>
      <span class="choice-logo">CASINO ROYALE</span>
      <span class="choice-title">管理メニューを選択</span>
      <div class="choice-deco">
        <span></span><span class="suit">♠ ♥ ♦ ♣</span><span></span>
      </div>
    </div>

    <div class="choice-grid">
      <a href="admin-reserve.html" class="choice-card reserve">
        <span class="choice-icon">🎫</span>
        <div class="choice-name">予約・受付管理</div>
        <div class="choice-desc">
          整理券の発行・呼出<br>
          待ち時間・来場者管理<br>
          ゲーム設定・開閉
        </div>
        <span class="choice-arrow">OPEN ▶</span>
      </a>
      <a href="admin-ranking.html" class="choice-card ranking">
        <span class="choice-icon">🏆</span>
        <div class="choice-name">ランキング管理</div>
        <div class="choice-desc">
          スコアの追加・編集<br>
          記録の削除<br>
          ランキング確認
        </div>
        <span class="choice-arrow">OPEN ▶</span>
      </a>
    </div>

    <div class="back-nav">
      <a href="index.html">🏠 TOP</a>
      <a href="reserve.html">🎫 予約ページ</a>
      <a href="reception.html">📋 受付ページ</a>
      <button class="logout-btn" onclick="doLogout()">⏻ ログアウト</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="data.js"></script>
<script>
// Stars
const se=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('span');
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*4}s`;
  se.appendChild(s)}

// セッション維持（同タブ内のみ）
if(sessionStorage.getItem('adminAuthed')==='1') showChoice();

function doLogin(){
  const pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PASSWORD){
    sessionStorage.setItem('adminAuthed','1');
    showChoice();
  } else {
    const err=document.getElementById('loginErr');
    err.classList.add('show');
    setTimeout(()=>err.classList.remove('show'),2200);
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

function showChoice(){
  document.getElementById('screenLogin').classList.add('hidden');
  document.getElementById('screenChoice').classList.remove('hidden');
}

function doLogout(){
  sessionStorage.removeItem('adminAuthed');
  document.getElementById('screenChoice').classList.add('hidden');
  document.getElementById('screenLogin').classList.remove('hidden');
  document.getElementById('pwInput').value='';
}

// サブページから戻ってきたとき用にセッションを渡す
// admin-reserve.html / admin-ranking.html でも同じセッションチェックを使う
document.querySelectorAll('.choice-card').forEach(card=>{
  card.addEventListener('click', e=>{
    // セッションをURLパラメータ不要でsessionStorageで共有済み
  });
});
</script>
</body>
</html>

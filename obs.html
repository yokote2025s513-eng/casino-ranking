<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CASINO ROYALE – OBS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f0c040;--gold2:#ffd700;--neon:#00ffe7;--dark:#05080f;--card:#0b1120;
  /* ゲームカラー */
  --c-poker-main:#4f9eff;    --c-poker-glow:rgba(79,158,255,.35);   --c-poker-bg:rgba(79,158,255,.07);
  --c-chin-main:#ff6b35;     --c-chin-glow:rgba(255,107,53,.35);    --c-chin-bg:rgba(255,107,53,.07);
  --c-bj-main:#a855f7;       --c-bj-glow:rgba(168,85,247,.35);      --c-bj-bg:rgba(168,85,247,.07);
  --c-horse-main:#22c55e;    --c-horse-glow:rgba(34,197,94,.35);    --c-horse-bg:rgba(34,197,94,.07);
}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);color:#e8dfc0;font-family:'Rajdhani',sans-serif}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(rgba(0,255,231,.04) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,255,231,.04) 1px,transparent 1px);
  background-size:80px 80px;pointer-events:none}

.corner{position:fixed;width:70px;height:70px;z-index:2}
.corner.tl{top:16px;left:16px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.corner.tr{top:16px;right:16px;border-top:2px solid var(--gold);border-right:2px solid var(--gold)}
.corner.bl{bottom:54px;left:16px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold)}
.corner.br{bottom:54px;right:16px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}

.obs-header{position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;padding:13px 50px;
  background:linear-gradient(180deg,rgba(5,8,15,.98) 80%,transparent);
  border-bottom:1px solid rgba(240,192,64,.2)}
.obs-logo{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(240,192,64,.6));letter-spacing:.08em}
.obs-center{display:flex;align-items:center;gap:14px}
.obs-suit{font-size:1.1rem;color:var(--gold);opacity:.7}
.live-badge{display:inline-flex;align-items:center;gap:7px;font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.2em;color:var(--neon)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--neon);animation:lp 1.5s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(0,255,231,.6)}50%{box-shadow:0 0 0 6px rgba(0,255,231,0)}}
.obs-right{display:flex;align-items:center;gap:14px}
.obs-time{font-family:'Orbitron',monospace;font-size:.92rem;color:var(--neon);letter-spacing:.2em;filter:drop-shadow(0 0 8px var(--neon))}
.admin-link{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.15em;color:rgba(232,223,192,.4);
  text-decoration:none;border:1px solid rgba(232,223,192,.2);padding:5px 13px;border-radius:2px;transition:all .2s}
.admin-link:hover{color:var(--gold);border-color:var(--gold)}

.ticker-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(240,192,64,.07);border-top:1px solid rgba(240,192,64,.25);padding:9px 0;overflow:hidden}
.ticker-inner{display:flex;gap:80px;animation:ticker 30s linear infinite;
  font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:.15em;color:var(--gold);white-space:nowrap}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* 4ゲームグリッド */
.main{position:fixed;top:60px;bottom:48px;left:0;right:0;z-index:1;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:12px;padding:12px 50px}

/* ゲームカード — カラーは data-game 属性で切替 */
.game-card{background:var(--card);border-radius:4px;overflow:hidden;
  display:flex;flex-direction:column;position:relative;
  border:1px solid var(--c);
  box-shadow:0 0 20px var(--cg);}
.game-card[data-game="ポーカー"]      {--c:rgba(79,158,255,.4); --cg:rgba(79,158,255,.15); --cm:var(--c-poker-main);  --cbg:var(--c-poker-bg)}
.game-card[data-game="チンチロ"]      {--c:rgba(255,107,53,.4); --cg:rgba(255,107,53,.15); --cm:var(--c-chin-main);   --cbg:var(--c-chin-bg)}
.game-card[data-game="ブラックジャック"]{--c:rgba(168,85,247,.4); --cg:rgba(168,85,247,.15);--cm:var(--c-bj-main);     --cbg:var(--c-bj-bg)}
.game-card[data-game="競馬"]          {--c:rgba(34,197,94,.4);  --cg:rgba(34,197,94,.15); --cm:var(--c-horse-main);  --cbg:var(--c-horse-bg)}

.game-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--cbg) 0%,transparent 55%);pointer-events:none;z-index:0}

.card-head{display:flex;align-items:center;gap:12px;padding:9px 16px;
  border-bottom:1px solid var(--c);flex-shrink:0;position:relative;z-index:1}
.card-icon{font-size:1.7rem;filter:drop-shadow(0 0 6px var(--cm))}
.card-title{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;color:var(--cm);letter-spacing:.08em}

.rank-list{flex:1;display:flex;flex-direction:column;justify-content:space-around;padding:4px 0;position:relative;z-index:1}

.rank-row{display:flex;align-items:center;gap:12px;padding:5px 16px;
  border-bottom:1px solid rgba(255,255,255,.04);position:relative;transition:background .2s}
.rank-row:last-child{border-bottom:none}

/* バー背景 — ゲームカラーで */
.bar-bg{position:absolute;left:0;top:0;bottom:0;pointer-events:none;
  background:var(--cbg);transition:width .9s cubic-bezier(.4,0,.2,1)}

.pos{font-family:'Orbitron',monospace;font-weight:700;width:30px;text-align:center;flex-shrink:0;position:relative;z-index:1}
.pos.p1{font-size:1.15rem;color:#ffd700;filter:drop-shadow(0 0 6px #ffd700)}
.pos.p2{font-size:.88rem;color:#c0c0c0}
.pos.p3{font-size:.88rem;color:#cd7f32}
.pos.px{font-size:.75rem;color:rgba(232,223,192,.28)}

.nick{flex:1;font-size:.97rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:relative;z-index:1}
.rank-row.top .nick{color:#ffd700;font-size:1.05rem}

.amt{font-family:'Orbitron',monospace;font-size:.76rem;flex-shrink:0;position:relative;z-index:1;color:var(--cm)}
.rank-row.top .amt{color:var(--gold2);font-size:.85rem}

.no-data{text-align:center;padding:18px;color:rgba(232,223,192,.22);
  font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:.2em}

/* 1位フラッシュアニメーション */
@keyframes crownFlash{
  0%{box-shadow:inset 0 0 0 0 rgba(255,215,0,0)}
  30%{box-shadow:inset 0 0 40px 6px rgba(255,215,0,.35)}
  100%{box-shadow:inset 0 0 0 0 rgba(255,215,0,0)}
}
.rank-row.flash-new-top{animation:crownFlash 1.4s ease-out}
</style>
</head>
<body>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="obs-header">
  <div class="obs-logo">♠ CASINO ROYALE</div>
  <div class="obs-center">
    <div class="obs-suit">♥ ♦ ♣</div>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
  </div>
  <div class="obs-right">
    <div class="obs-time" id="clock"></div>
    <a href="admin.html" class="admin-link">⚙ ADMIN</a>
  </div>
</div>

<div class="main" id="main"></div>

<div class="ticker-bar">
  <div class="ticker-inner" id="ticker">CASINO ROYALE　◆　LIVE RANKING　◆　CASINO ROYALE　◆　LIVE RANKING</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="data.js"></script>
<script>
const ICONS={'ポーカー':'🃏','チンチロ':'🎲','ブラックジャック':'🂡','競馬':'🏇'};

// 直前の1位を記憶（アニメーション用）
const prevTop={};

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}
setInterval(updateClock,1000);updateClock();

function buildCard(game,records){
  const data=aggregateByGame(records,game).slice(0,5);
  const max=data[0]?.total||1;
  const newTop=data[0]?.nickname||null;
  const topChanged=prevTop[game]!==undefined && prevTop[game]!==newTop && newTop!==null;
  prevTop[game]=newTop;

  const rows=data.length?data.map((d,i)=>{
    const isTop=i===0;
    const pc=i===0?'p1':i===1?'p2':i===2?'p3':'px';
    const label=i===0?'👑':i+1;
    const pct=(d.total/max*100).toFixed(1);
    // 1位が入れ替わった行にflashクラス
    const flashCls=(isTop&&topChanged)?' flash-new-top':'';
    return `<div class="rank-row${isTop?' top':''}${flashCls}">
      <div class="bar-bg" style="width:${pct}%"></div>
      <div class="pos ${pc}">${label}</div>
      <div class="nick">${d.nickname}</div>
      <div class="amt" style="${d.total<0?'color:#ff2d78':''}">${d.total<0?'▼ ':''} ${fmt(d.total)}</div>
    </div>`;
  }).join(''):'<div class="no-data">NO DATA</div>';

  return `<div class="game-card" data-game="${game}">
    <div class="card-head">
      <span class="card-icon">${ICONS[game]}</span>
      <div class="card-title">${game}</div>
    </div>
    <div class="rank-list">${rows}</div>
  </div>`;
}

function render(records){
  document.getElementById('main').innerHTML=GAMES.map(g=>buildCard(g,records)).join('');
  const all=aggregateAll(records).slice(0,12);
  if(all.length){
    const t=all.map(d=>`${d.nickname}  ${fmt(d.total)}`).join('　◆　');
    document.getElementById('ticker').textContent=t+'　　　　'+t;
  }
}

onRecordsChange(records=>render(records));
</script>
</body>
</html>
